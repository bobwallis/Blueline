# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    web_link: true
    # Trust the front-end server (FrankenPHP/Caddy) to supply X-Forwarded-Prefix so
    # Symfony generates correct URLs when the app is served from a path prefix.
    # Caddy always strips any client-supplied X-Forwarded-Prefix before setting its own,
    # so REMOTE_ADDR here is safe — clients cannot inject the header.
    trusted_proxies: 'REMOTE_ADDR'
    trusted_headers: ['x-forwarded-prefix', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']
    request:
        formats:
            png: 'image/png'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
